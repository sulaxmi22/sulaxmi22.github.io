version: '3.8'
services:
  backend:
    build: .
    ports: ["8001:8001"]
    env_file: [.env]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  frontend:
    image: nginx:alpine
    ports: ["3001:80"]
    volumes: ["./frontend:/usr/share/nginx/html:ro"]
    depends_on: [backend]
