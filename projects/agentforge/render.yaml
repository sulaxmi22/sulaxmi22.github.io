services:
  - type: web
    name: agentforge-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: OPENAI_MODEL
        value: meta/llama-3.3-70b-instruct
      - key: TAVILY_API_KEY
        sync: false
      - key: QUALITY_THRESHOLD
        value: "0.8"
      - key: MAX_REVISIONS
        value: "3"
