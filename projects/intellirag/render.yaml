services:
  - type: web
    name: intellirag-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: OPENAI_MODEL
        value: meta/llama-3.3-70b-instruct
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: RERANKER_MODEL
        value: cross-encoder/ms-marco-MiniLM-L-6-v2
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_db
      - key: CHROMA_COLLECTION
        value: intellirag_docs
      - key: CHUNK_SIZE
        value: "512"
      - key: CHUNK_OVERLAP
        value: "50"
      - key: TOP_K_RETRIEVAL
        value: "10"
      - key: TOP_K_RERANK
        value: "5"
      - key: RELEVANCE_THRESHOLD
        value: "0.3"
